# ============================================
# MSP Monitoring - Nginx Configuration (HTTPS)
# ============================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    upstream grafana {
        server grafana:3000;
    }

    upstream victoriametrics {
        server victoriametrics:8428;
    }

    upstream portal {
        server portal:8000;
    }

    # -----------------------------------------------
    # grafana.tbit.co.kr — HTTP
    # 에이전트 write 엔드포인트는 HTTP 유지 (기존 에이전트 호환)
    # 나머지는 HTTPS 리다이렉트
    # -----------------------------------------------
    server {
        listen 80;
        server_name grafana.tbit.co.kr;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /api/v1/write {
            proxy_pass http://victoriametrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10m;
        }

        location /api/v1/import/ {
            proxy_pass http://victoriametrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10m;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------
    # grafana.tbit.co.kr — HTTPS
    # -----------------------------------------------
    server {
        listen 443 ssl;
        server_name grafana.tbit.co.kr;

        ssl_certificate     /etc/letsencrypt/live/grafana.tbit.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.tbit.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /api/v1/write {
            proxy_pass http://victoriametrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10m;
        }

        location /api/v1/import/ {
            proxy_pass http://victoriametrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10m;
        }

        location / {
            auth_basic "MSP Monitoring - Login Required";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=login burst=10 nodelay;

            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
        }

        location /api/ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------------
    # grafana-admin.tbit.co.kr — HTTP → HTTPS 리다이렉트
    # -----------------------------------------------
    server {
        listen 80;
        server_name grafana-admin.tbit.co.kr;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------
    # grafana-admin.tbit.co.kr — HTTPS (MSP Admin Portal)
    # -----------------------------------------------
    server {
        listen 443 ssl;
        server_name grafana-admin.tbit.co.kr;

        ssl_certificate     /etc/letsencrypt/live/grafana.tbit.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.tbit.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
        }
    }
}
